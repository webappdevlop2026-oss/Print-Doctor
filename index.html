<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">প্রিন্ট ডাক্তার — ফটোকপি ও প্রিন্টার সমস্যার AI সমাধান</title>

<!-- PWA: ইনস্টলযোগ্য অ্যাপ হিসেবে চালানোর জন্য প্রয়োজনীয় ট্যাগ -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#FAF7F0">
<link rel="icon" href="/icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="প্রিন্ট ডাক্তার">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF7F0;
    --paper-dim:#F1ECE0;
    --ink:#1C1B18;
    --graphite:#524F47;
    --line:#DCD5C4;
    --cyan:#00AEEF;
    --magenta:#EC1C6E;
    --yellow:#F5B700;
    --ok:#1E8E5A;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans Bengali','Noto Sans Devanagari','Noto Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  .display{font-family:'Space Grotesk','Noto Sans Bengali','Noto Sans Devanagari',sans-serif;}

  .regmark{
    display:inline-block;
    width:14px;height:14px;
    border-radius:50%;
    border:1.5px solid currentColor;
    position:relative;
    flex-shrink:0;
  }
  .regmark::before,.regmark::after{content:''; position:absolute; background:currentColor;}
  .regmark::before{ left:50%; top:-4px; bottom:-4px; width:1.5px; transform:translateX(-50%);}
  .regmark::after{ top:50%; left:-4px; right:-4px; height:1.5px; transform:translateY(-50%);}

  /* ===== NAV ===== */
  header{
    position:sticky; top:0; z-index:50;
    background:rgba(250,247,240,0.92);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
  }
  .nav-wrap{
    max-width:1160px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px; gap:16px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700; font-size:19px; letter-spacing:-0.01em;
    text-decoration:none; color:var(--ink); white-space:nowrap;
  }
  .brand .regmark{color:var(--magenta);}
  .nav-links{display:flex; gap:24px; align-items:center;}
  .nav-links a{color:var(--graphite); text-decoration:none; font-size:14px; font-weight:500; white-space:nowrap;}
  .nav-links a:hover{color:var(--ink);}
  .nav-right{display:flex; align-items:center; gap:14px;}

  /* language switcher */
  .lang-switch{
    display:flex; background:var(--paper-dim); border:1px solid var(--line);
    border-radius:100px; padding:3px; gap:2px;
  }
  .lang-btn{
    border:none; background:transparent; padding:6px 12px; border-radius:100px;
    font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:600;
    color:var(--graphite); cursor:pointer; transition:background .15s ease, color .15s ease;
  }
  .lang-btn.active{background:var(--ink); color:var(--paper);}
  .lang-btn:hover:not(.active){color:var(--ink);}

  .nav-cta{
    background:var(--ink); color:var(--paper);
    padding:9px 16px; border-radius:3px; font-size:13.5px; font-weight:600; white-space:nowrap;
  }
  .nav-cta:hover{background:var(--magenta); color:#fff;}

  /* ===== HERO ===== */
  .hero{
    max-width:1160px; margin:0 auto;
    padding:72px 24px 60px;
    display:grid; grid-template-columns:1.05fr 0.95fr; gap:56px; align-items:center;
  }
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:500;
    color:var(--graphite); background:var(--paper-dim);
    border:1px solid var(--line); padding:6px 12px; border-radius:100px;
    margin-bottom:22px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--ok);}
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:42px; line-height:1.18; letter-spacing:-0.015em;
    margin:0 0 20px; font-weight:700;
  }
  h1 .accent{color:var(--magenta);}
  .hero p.lead{
    font-size:16.5px; line-height:1.75; color:var(--graphite);
    max-width:480px; margin:0 0 30px;
  }
  .hero-ctas{display:flex; gap:14px; flex-wrap:wrap;}
  .btn-primary{
    background:var(--ink); color:var(--paper);
    padding:14px 24px; border-radius:3px; font-weight:700; font-size:14.5px;
    text-decoration:none; display:inline-flex; align-items:center; gap:8px;
    border:none; cursor:pointer; transition:transform .15s ease, background .15s ease;
  }
  .btn-primary:hover{background:var(--magenta); transform:translateY(-1px);}
  .btn-ghost{
    background:transparent; color:var(--ink);
    padding:13px 22px; border-radius:3px; font-weight:600; font-size:14.5px;
    text-decoration:none; border:1.5px solid var(--line);
  }
  .btn-ghost:hover{border-color:var(--ink);}

  .trust-row{display:flex; gap:22px; margin-top:34px; flex-wrap:wrap;}
  .trust-item{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--graphite);}
  .trust-item .regmark{width:10px;height:10px; color:var(--cyan);}

  .ticket{
    background:#fff; border:1px solid var(--line); border-radius:4px;
    box-shadow:0 18px 40px -18px rgba(28,27,24,0.28);
    position:relative; transform:rotate(1.2deg);
  }
  .ticket::before{
    content:''; position:absolute; left:0; right:0; top:52px; height:0;
    border-top:2px dashed var(--line);
  }
  .ticket-head{padding:20px 22px 26px; display:flex; justify-content:space-between; align-items:flex-start;}
  .ticket-head .tno{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--graphite);}
  .ticket-head .stamp{
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600;
    color:var(--ok); border:1.5px solid var(--ok); padding:3px 9px; border-radius:100px;
    transform:rotate(-6deg); white-space:nowrap;
  }
  .ticket-body{padding:30px 22px 24px;}
  .ticket-row{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px dotted var(--line); font-size:13.5px; gap:12px;}
  .ticket-row span:first-child{color:var(--graphite); white-space:nowrap;}
  .ticket-row span:last-child{font-weight:600; text-align:right;}
  .ticket-cmyk{display:flex; gap:7px; padding:20px 22px 22px;}
  .ticket-cmyk i{width:16px;height:16px;border-radius:50%; display:block;}

  /* ===== SECTIONS ===== */
  section{max-width:1160px; margin:0 auto; padding:70px 24px;}
  .section-tag{
    font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:500;
    color:var(--magenta); letter-spacing:0.04em; margin-bottom:10px; display:block;
  }
  h2{font-family:'Space Grotesk',sans-serif; font-size:29px; margin:0 0 14px; letter-spacing:-0.01em;}
  .section-lead{color:var(--graphite); font-size:15px; max-width:580px; line-height:1.7; margin-bottom:44px;}

  .steps{display:grid; grid-template-columns:repeat(3,1fr); gap:24px;}
  .step{background:var(--paper-dim); border:1px solid var(--line); border-radius:6px; padding:26px 22px;}
  .step .num{
    font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--graphite);
    display:flex; align-items:center; gap:8px; margin-bottom:14px;
  }
  .step h3{font-family:'Space Grotesk',sans-serif; font-size:17px; margin:0 0 8px;}
  .step p{font-size:14px; color:var(--graphite); line-height:1.65; margin:0;}
  .step:nth-child(1) .num{color:var(--cyan);}
  .step:nth-child(2) .num{color:var(--magenta);}
  .step:nth-child(3) .num{color:var(--yellow);}

  /* ===== AI CHAT PANEL ===== */
  #ai-help{padding-top:20px;}
  .panel{
    background:#22201C; border-radius:14px; padding:22px;
    box-shadow:0 30px 60px -30px rgba(0,0,0,0.5);
  }
  .panel-top{display:flex; justify-content:space-between; align-items:center; padding:2px 6px 16px; flex-wrap:wrap; gap:10px;}
  .panel-title{
    color:#EFE9DA; font-family:'JetBrains Mono',monospace; font-size:12.5px;
    display:flex; align-items:center; gap:10px;
  }
  .led{width:8px;height:8px;border-radius:50%; background:var(--ok); box-shadow:0 0 8px var(--ok);}
  .panel-lights{display:flex; gap:6px;}
  .panel-lights i{width:8px;height:8px;border-radius:50%;display:block;}

  /* chat-language mini switch inside panel */
  .chat-lang-switch{display:flex; gap:2px; background:#17160F; border:1px solid #38352E; border-radius:100px; padding:3px;}
  .chat-lang-switch button{
    border:none; background:transparent; color:#9A9587; font-family:'JetBrains Mono',monospace;
    font-size:11.5px; font-weight:600; padding:5px 10px; border-radius:100px; cursor:pointer;
  }
  .chat-lang-switch button.active{background:var(--yellow); color:#1C1B18;}

  .screen{
    background:#0F0E0C; border-radius:8px; border:1px solid #38352E;
    padding:18px; height:420px; overflow-y:auto;
    display:flex; flex-direction:column; gap:14px;
  }
  .screen::-webkit-scrollbar{width:8px;}
  .screen::-webkit-scrollbar-thumb{background:#38352E; border-radius:4px;}

  .msg{max-width:82%; font-size:14.5px; line-height:1.65; padding:12px 15px; border-radius:8px;}
  .msg.user{align-self:flex-end; background:#2A5B8C; color:#F2F6FA; border-bottom-right-radius:2px;}
  .msg.ai{
    align-self:flex-start; background:#1B1A16; color:#D9F7E4; border:1px solid #2C3B31;
    font-family:'JetBrains Mono',monospace; font-size:13.3px; border-bottom-left-radius:2px;
    white-space:pre-wrap;
  }
  .msg.ai .tag{color:var(--cyan); display:block; margin-bottom:6px; font-weight:600;}
  .msg.sys{align-self:center; color:#7A7568; font-size:12.5px; font-family:'JetBrains Mono',monospace;}
  .typing{align-self:flex-start; display:flex; gap:5px; padding:6px 4px;}
  .typing span{width:6px;height:6px;border-radius:50%; background:#3E7B5A; animation:blink 1.2s infinite ease-in-out;}
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25;} 40%{opacity:1;}}

  .input-row{
    display:flex; gap:10px; margin-top:14px;
    background:#17160F; padding:8px; border-radius:8px; border:1px solid #38352E;
  }
  .input-row textarea{
    flex:1; resize:none; background:transparent; border:none; outline:none;
    color:#F2EEDF; font-family:'Noto Sans Bengali','Noto Sans Devanagari',sans-serif; font-size:14.5px;
    padding:10px 12px; min-height:26px; max-height:120px;
  }
  .input-row textarea::placeholder{color:#6B6858;}
  .send-btn{
    background:var(--yellow); color:#1C1B18; border:none; border-radius:6px;
    padding:0 20px; font-weight:700; font-size:14px; cursor:pointer;
    display:flex; align-items:center; gap:6px; transition:background .15s ease; white-space:nowrap;
  }
  .send-btn:hover{background:var(--magenta); color:#fff;}
  .send-btn:disabled{opacity:0.5; cursor:not-allowed;}

  .quick-tags{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px;}
  .qtag{
    background:#1B1A16; color:#B9B49E; border:1px solid #38352E;
    font-size:12.5px; padding:7px 13px; border-radius:100px; cursor:pointer;
    font-family:'JetBrains Mono',monospace;
  }
  .qtag:hover{border-color:var(--yellow); color:var(--yellow);}

  .disclaimer{text-align:center; font-size:12.5px; color:var(--graphite); margin-top:16px;}

  /* ===== PROBLEM CARDS ===== */
  .grid-3{display:grid; grid-template-columns:repeat(3,1fr); gap:20px;}
  .problem-card{
    background:#fff; border:1px solid var(--line); border-radius:6px; padding:22px;
    position:relative; overflow:hidden;
  }
  .problem-card::before{content:''; position:absolute; left:0; top:0; bottom:0; width:4px;}
  .problem-card.c1::before{background:var(--cyan);}
  .problem-card.c2::before{background:var(--magenta);}
  .problem-card.c3::before{background:var(--yellow);}
  .problem-card h4{font-family:'Space Grotesk',sans-serif; font-size:16px; margin:0 0 8px;}
  .problem-card p{font-size:13.8px; color:var(--graphite); line-height:1.6; margin:0 0 14px;}
  .problem-card button{
    background:none; border:none; color:var(--ink); font-weight:600; font-size:13.5px;
    cursor:pointer; padding:0; text-decoration:underline; text-underline-offset:3px;
  }

  /* ===== FOOTER ===== */
  footer{border-top:1px solid var(--line); background:var(--paper-dim);}
  .footer-wrap{
    max-width:1160px; margin:0 auto; padding:44px 24px;
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;
  }
  .footer-brand{display:flex; align-items:center; gap:10px; font-family:'Space Grotesk'; font-weight:700;}
  .footer-brand .regmark{color:var(--magenta); width:12px; height:12px;}
  .footer-links{display:flex; gap:24px;}
  .footer-links a{color:var(--graphite); text-decoration:none; font-size:13.5px;}
  .footer-note{color:var(--graphite); font-size:12.5px; width:100%; padding-top:18px; border-top:1px dotted var(--line); margin-top:8px;}

  @media (max-width:860px){
    .hero{grid-template-columns:1fr; padding-top:44px;}
    h1{font-size:30px;}
    .steps, .grid-3{grid-template-columns:1fr;}
    .nav-links{display:none;}
    .screen{height:380px;}
    .nav-wrap{flex-wrap:wrap;}
  }

  /* ===== MOBILE CHAT FIX ===== */
  @media (max-width:640px){
    section{padding:44px 16px;}
    #ai-help{padding-top:12px;}
    h2{font-size:24px;}
    .section-lead{margin-bottom:28px;}

    .panel{padding:12px; border-radius:12px; position:relative;}
    .panel-top{padding:2px 4px 12px; gap:8px;}
    .panel-title{font-size:11.5px; gap:8px;}
    .chat-lang-switch button{padding:4px 8px; font-size:10.5px;}
    .panel-lights{gap:4px;}
    .panel-lights i{width:6px;height:6px;}

    /* চ্যাট মেসেজ এলাকা — স্ক্রিনের উচ্চতা অনুযায়ী মানানসই, নিজে থেকেই স্ক্রল হবে */
    .screen{
      height:min(52vh, 420px);
      padding:12px;
      gap:10px;
      border-radius:6px;
    }
    .msg{max-width:90%; font-size:13.8px; padding:10px 12px;}
    .msg.ai{font-size:12.6px;}

    /* কুইক-ট্যাগ পাশাপাশি স্ক্রল হবে, লাইন ভেঙে জায়গা নষ্ট করবে না */
    .quick-tags{
      flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch;
      padding-top:2px; padding-bottom:6px; margin-top:10px;
      scrollbar-width:none;
    }
    .quick-tags::-webkit-scrollbar{display:none;}
    .qtag{flex:0 0 auto; padding:7px 12px; font-size:12px;}

    /* ইনপুট বক্স সবসময় দৃশ্যমান জায়গায় স্থির থাকবে, মেসেজ যতই থাকুক না কেন */
    .input-row{
      position:sticky; bottom:0; z-index:5;
      margin-top:10px; padding:7px; gap:8px;
    }
    .input-row textarea{font-size:14px; padding:8px 10px; min-height:22px;}
    .send-btn{padding:0 14px; font-size:13px;}

    .disclaimer{font-size:11.5px; padding:0 6px;}
  }

  @media (max-width:380px){
    .screen{height:min(48vh, 380px);}
    .msg{font-size:13px;}
    .qtag{font-size:11.5px; padding:6px 10px;}
  }
</style>
</head>
<body>

<header>
  <div class="nav-wrap">
    <a href="#top" class="brand"><span class="regmark"></span> <span data-i18n="brand">প্রিন্ট ডাক্তার</span></a>
    <nav class="nav-links">
      <a href="#ai-help" data-i18n="nav_ai">AI সমাধান</a>
      <a href="#how" data-i18n="nav_how">কীভাবে কাজ করে</a>
      <a href="#problems" data-i18n="nav_problems">সাধারণ সমস্যা</a>
    </nav>
    <div class="nav-right">
      <div class="lang-switch" id="langSwitch">
        <button class="lang-btn" data-lang="bn">বাং</button>
        <button class="lang-btn" data-lang="hi">हिं</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <a href="#ai-help" class="nav-cta" data-i18n="nav_cta">সমস্যা লিখুন</a>
    </div>
  </div>
</header>

<div id="top" class="hero">
  <div>
    <span class="eyebrow"><span class="dot"></span> <span data-i18n="eyebrow">AI সার্ভিস ইঞ্জিনিয়ার — সবসময় অনলাইন</span></span>
    <h1 data-i18n-html="h1"></h1>
    <p class="lead" data-i18n="lead"></p>
    <div class="hero-ctas">
      <a href="#ai-help" class="btn-primary" data-i18n="cta_primary"></a>
      <a href="#problems" class="btn-ghost" data-i18n="cta_ghost"></a>
    </div>
    <div class="trust-row">
      <div class="trust-item"><span class="regmark"></span> <span data-i18n="trust1"></span></div>
      <div class="trust-item"><span class="regmark"></span> <span data-i18n="trust2"></span></div>
      <div class="trust-item"><span class="regmark"></span> <span data-i18n="trust3"></span></div>
    </div>
  </div>

  <div class="ticket">
    <div class="ticket-head">
      <div>
        <div class="tno mono" data-i18n="ticket_no">টিকেট #PD-04471</div>
        <div class="display" style="font-weight:700; font-size:17px; margin-top:4px;" data-i18n="ticket_title"></div>
      </div>
      <div class="stamp mono" data-i18n="ticket_stamp"></div>
    </div>
    <div class="ticket-body">
      <div class="ticket-row"><span data-i18n="ticket_machine_label"></span><span data-i18n="ticket_machine_val"></span></div>
      <div class="ticket-row"><span data-i18n="ticket_problem_label"></span><span data-i18n="ticket_problem_val"></span></div>
      <div class="ticket-row"><span data-i18n="ticket_diag_label"></span><span data-i18n="ticket_diag_val"></span></div>
      <div class="ticket-row"><span data-i18n="ticket_time_label"></span><span data-i18n="ticket_time_val"></span></div>
    </div>
    <div class="ticket-cmyk">
      <i style="background:var(--cyan)"></i>
      <i style="background:var(--magenta)"></i>
      <i style="background:var(--yellow)"></i>
      <i style="background:#1C1B18"></i>
    </div>
  </div>
</div>

<section id="how">
  <span class="section-tag" data-i18n="tag01"></span>
  <h2 data-i18n="how_title"></h2>
  <p class="section-lead" data-i18n="how_lead"></p>
  <div class="steps">
    <div class="step">
      <div class="num">01 <span class="regmark"></span></div>
      <h3 data-i18n="step1_h"></h3>
      <p data-i18n="step1_p"></p>
    </div>
    <div class="step">
      <div class="num">02 <span class="regmark"></span></div>
      <h3 data-i18n="step2_h"></h3>
      <p data-i18n="step2_p"></p>
    </div>
    <div class="step">
      <div class="num">03 <span class="regmark"></span></div>
      <h3 data-i18n="step3_h"></h3>
      <p data-i18n="step3_p"></p>
    </div>
  </div>
</section>

<section id="ai-help">
  <span class="section-tag" data-i18n="tag02"></span>
  <h2 data-i18n="ai_title"></h2>
  <p class="section-lead" data-i18n="ai_lead"></p>

  <div class="panel">
    <div class="panel-top">
      <div class="panel-title"><span class="led"></span> <span data-i18n="panel_title"></span></div>

let currentLang = 'bn';
let history = [];

function applyLanguage(lang){
  currentLang = lang;
  const dict = T[lang];
  document.documentElement.lang = lang;
  document.title = dict.pageTitle;

  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    if(dict[key] !== undefined) el.textContent = dict[key];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{
    const key = el.getAttribute('data-i18n-html');
    if(dict[key] !== undefined) el.innerHTML = dict[key];
  });

  document.getElementById('initialGreeting').textContent = dict.initial_greeting;
  document.getElementById('userInput').placeholder = dict.placeholder;

  // quick tags in the panel
  const tagDefs = [
    ['tag_jam','tq_jam'], ['tag_blur','tq_blur'], ['tag_off','tq_off'],
    ['tag_scan','tq_scan'], ['tag_toner','tq_toner']
  ];
  const qtWrap = document.getElementById('quickTags');
  qtWrap.innerHTML = '';
  tagDefs.forEach(([labelKey, qKey])=>{
    const b = document.createElement('button');
    b.className = 'qtag';
    b.textContent = dict[labelKey];
    b.addEventListener('click', ()=> fillAndFocus(dict[qKey]));
    qtWrap.appendChild(b);
  });

  // problem card buttons
  document.getElementById('p1btn').onclick = ()=> fillAndFocus(dict.q1);
  document.getElementById('p2btn').onclick = ()=> fillAndFocus(dict.q2);
  document.getElementById('p3btn').onclick = ()=> fillAndFocus(dict.q3);

  // sync switch button states (both nav + chat panel)
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-lang')===lang);
  });
  document.querySelectorAll('#chatLangSwitch button').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-lang')===lang);
  });

  // reset the visible greeting message if chat hasn't started yet
  if(history.length === 0){
    document.getElementById('initialGreeting').textContent = dict.initial_greeting;
  }
}

function fillAndFocus(text){
  document.getElementById('ai-help').scrollIntoView({behavior:'smooth', block:'start'});
  const inputEl = document.getElementById('userInput');
  inputEl.value = text;
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  setTimeout(()=> inputEl.focus(), 400);
}

document.querySelectorAll('.lang-btn, #chatLangSwitch button').forEach(btn=>{
  btn.addEventListener('click', ()=> applyLanguage(btn.getAttribute('data-lang')));
});

/* ===================== CHAT LOGIC ===================== */
const screenEl = document.getElementById('screen');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

function langName(lang){
  return { bn: 'বাংলা (Bengali)', hi: 'हिन्दी (Hindi)', en: 'English' }[lang];
}

function buildSystemPrompt(lang){
  return `তুমি/आप/You are an experienced photocopier and printer service engineer with 15 years of experience across all major brands (Canon, HP, Epson, Xerox, Ricoh, Brother, Samsung).

LANGUAGE RULES:
- The customer's preferred language is currently set to ${langName(lang)}. Reply in that language by default.
- However, if the customer writes their message in a different language (Bengali, Hindi, or English), always reply in the SAME language the customer just used, not the default.
- Never mix languages within a single reply.

BEHAVIOR RULES:
- Keep the tone simple, clear, and friendly, like a real technician talking to a customer.
- First briefly state the likely cause(s) of the problem.
- Then give a numbered, step-by-step fix, starting with the simplest thing the customer can try themselves at home or in their shop.
- Ask for more details when needed (machine model, how long the problem has existed, any sounds/lights).
- Warn about electric shock or fire risk where relevant, and recommend calling a professional technician for anything unsafe or complex.
- Keep replies concise and practical — no filler.
- Always identify yourself as an "AI Service Engineer", never pretend to be human.`;
}

function addMessage(role, text) {
  const div = document.createElement('div');
  if (role === 'user') {
    div.className = 'msg user';
    div.textContent = text;
  } else {
    div.className = 'msg ai';
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = T[currentLang].ai_tag;
    div.appendChild(tag);
    div.appendChild(document.createTextNode(text));
  }
  screenEl.appendChild(div);
  screenEl.scrollTop = screenEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  screenEl.appendChild(div);
  screenEl.scrollTop = screenEl.scrollHeight;
}
function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function sendMessage(text) {
  if (!text.trim()) return;
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  showTyping();

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system: buildSystemPrompt(currentLang),
        messages: history
      })
    });
    const data = await response.json();
    hideTyping();

    let replyText = "";
    if (data && data.content) {
      replyText = data.content
        .map(block => block.type === 'text' ? block.text : '')
        .filter(Boolean)
        .join('\n');
    }
    if (!replyText) replyText = T[currentLang].err_generic;
    addMessage('ai', replyText);
    history.push({ role: 'assistant', content: replyText });
  } catch (err) {
    hideTyping();
    addMessage('ai', T[currentLang].err_network);
    console.error(err);
  } finally {
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener('click', () => sendMessage(inputEl.value));
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(inputEl.value);
  }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});
